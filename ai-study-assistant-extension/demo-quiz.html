<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Assistant Demo Quiz</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, #eaf1fb 100%);
        color: #132238;
      }

      main {
        max-width: 720px;
        margin: 48px auto;
        padding: 32px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #d7e3f4;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(18, 34, 56, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p,
      li,
      label {
        font-size: 18px;
        line-height: 1.6;
      }

      ul {
        padding-left: 22px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Practice Quiz</h1>
      <p>Question 1: Which planet is known as the Red Planet?</p>
      <ul>
        <li>A. Venus</li>
        <li>B. Mars</li>
        <li>C. Jupiter</li>
        <li>D. Mercury</li>
      </ul>
      <p>Select the best answer from the options above.</p>
    </main>
  </body>
</html>
